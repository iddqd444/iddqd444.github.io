---
title: Блог
description: Статьи о подготовке к экзаменам.
---
<div class="container mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold text-center text-primary mb-12">Полезные статьи</h1>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for post in site.posts %}
        <article class="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col">
            <div class="p-6 flex-grow">
                <p class="text-sm text-gray-500 mb-2">{{ post.date | date: "%d.%m.%Y" }}</p>
                <h2 class="text-xl font-bold mb-3 text-primary">{{ post.title }}</h2>
                <p class="text-gray-600 mb-4">{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
            </div>
            <div class="px-6 pb-6">
                <a href="{{ post.url }}" class="text-accent font-semibold hover:underline">Читать далее →</a>
            </div>
        </article>
        {% endfor %}
    </div>
</div>
